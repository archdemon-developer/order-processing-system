spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/payments_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

kafka:
  bootstrap-servers: localhost:29092

payment:
  failure-rate: 0.3
  retry:
    max-attempts: 3
    delay-ms: 2000
  error-handler:
    back-off-interval-ms: 1000
    back-off-max-attempts: 3

outbox:
  retention-hours: 24
  cleanup-interval-ms: 3600000

connect:
  url: http://localhost:8083
  connector-names:
    - debezium-orders-outbox

management:
  endpoint:
    health:
      show-details: always