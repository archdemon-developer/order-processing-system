spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/payments_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: redis
      port: 6379
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

kafka:
  bootstrap-servers: kafka:9092

payment:
  failure-rate: 0.3
  retry:
    max-attempts: 3
    delay-ms: 2000