name: CI

on:
  push:
    branches:
      - '**'

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/archdemon-developer/order-processing-system
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:

  # ─── VALIDATE ───────────────────────────────────────────────────────────────

  spotless:
    name: Spotless
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Run spotlessCheck
        run: ./gradlew spotlessCheck --no-daemon

  # ─── TEST ────────────────────────────────────────────────────────────────────

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Run unit tests
        run: ./gradlew :shared:test :order-service:test :payment-service:test :analytics-service:test :notification-service:test --no-daemon
      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            **/build/test-results/test/TEST-*.xml
            **/build/reports/tests/
            **/build/jacoco/test.exec
          retention-days: 7
      - name: Publish unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-junit
          path: "**/build/test-results/test/TEST-*.xml"
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Run integration tests
        run: ./gradlew :order-service:integrationTest :payment-service:integrationTest :analytics-service:integrationTest :notification-service:integrationTest --no-daemon
      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            **/build/test-results/integrationTest/TEST-*.xml
            **/build/reports/tests/
            **/build/jacoco/integrationTest.exec
          retention-days: 7

  # ─── COVERAGE ────────────────────────────────────────────────────────────────

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [ unit-tests, integration-tests ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Download unit test exec files
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
      - name: Download integration test exec files
        uses: actions/download-artifact@v4
        with:
          name: integration-test-results
      - name: Run coverage verification
        run: |
          ./gradlew :shared:jacocoTestReport :shared:jacocoCoverageVerification --no-daemon
          ./gradlew :order-service:jacocoTestReport :order-service:jacocoCoverageVerification --no-daemon
          ./gradlew :payment-service:jacocoTestReport :payment-service:jacocoCoverageVerification --no-daemon
          ./gradlew :notification-service:jacocoTestReport :notification-service:jacocoCoverageVerification --no-daemon
          ./gradlew :analytics-service:jacocoTestReport :analytics-service:jacocoCoverageVerification --no-daemon
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: "**/build/reports/jacoco/"
          retention-days: 7

  # ─── BUILD ───────────────────────────────────────────────────────────────────

  build-order-service:
    name: Build order-service
    runs-on: ubuntu-latest
    needs: [ spotless, coverage ]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push order-service
        run: |
          docker build \
            -t ${{ env.IMAGE_PREFIX }}/order-service:${GITHUB_SHA::7} \
            -t ${{ env.IMAGE_PREFIX }}/order-service:latest \
            -f order-service/Dockerfile .
          docker push ${{ env.IMAGE_PREFIX }}/order-service:${GITHUB_SHA::7}
          docker push ${{ env.IMAGE_PREFIX }}/order-service:latest

  build-payment-service:
    name: Build payment-service
    runs-on: ubuntu-latest
    needs: [ spotless, coverage ]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push payment-service
        run: |
          docker build \
            -t ${{ env.IMAGE_PREFIX }}/payment-service:${GITHUB_SHA::7} \
            -t ${{ env.IMAGE_PREFIX }}/payment-service:latest \
            -f payment-service/Dockerfile .
          docker push ${{ env.IMAGE_PREFIX }}/payment-service:${GITHUB_SHA::7}
          docker push ${{ env.IMAGE_PREFIX }}/payment-service:latest

  build-analytics-service:
    name: Build analytics-service
    runs-on: ubuntu-latest
    needs: [ spotless, coverage ]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push analytics-service
        run: |
          docker build \
            -t ${{ env.IMAGE_PREFIX }}/analytics-service:${GITHUB_SHA::7} \
            -t ${{ env.IMAGE_PREFIX }}/analytics-service:latest \
            -f analytics-service/Dockerfile .
          docker push ${{ env.IMAGE_PREFIX }}/analytics-service:${GITHUB_SHA::7}
          docker push ${{ env.IMAGE_PREFIX }}/analytics-service:latest

  build-notification-service:
    name: Build notification-service
    runs-on: ubuntu-latest
    needs: [ spotless, coverage ]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push notification-service
        run: |
          docker build \
            -t ${{ env.IMAGE_PREFIX }}/notification-service:${GITHUB_SHA::7} \
            -t ${{ env.IMAGE_PREFIX }}/notification-service:latest \
            -f notification-service/Dockerfile .
          docker push ${{ env.IMAGE_PREFIX }}/notification-service:${GITHUB_SHA::7}
          docker push ${{ env.IMAGE_PREFIX }}/notification-service:latest
  

  # ─── DEPLOY ──────────────────────────────────────────────────────────────────

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [ build-order-service, build-payment-service, build-notification-service, build-analytics-service ]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy placeholder
        run: echo "Deployment placeholder - Minikube/Helm coming soon"