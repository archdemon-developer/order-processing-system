spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

outbox:
  retention-hours: 24
  cleanup-interval-ms: 3600000

logging:
  level:
    org.flywaydb: DEBUG

connect:
  url: http://localhost:8083
  connector-names:
    - debezium-orders-outbox