stages:
  - validate
  - test
  - coverage
  - build
  - deploy

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/order-service"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .gradle/
    - order-service/build/
    - shared/build/

# ─── VALIDATE ───────────────────────────────────────────────────────────────

spotless:
  stage: validate
  image: eclipse-temurin:21-jdk-alpine
  script:
    - ./gradlew spotlessCheck --no-daemon
  rules:
    - if: $CI_COMMIT_BRANCH

# ─── TEST ────────────────────────────────────────────────────────────────────

unit-tests:
  stage: test
  image: eclipse-temurin:21-jdk-alpine
  script:
    - ./gradlew :shared:test :order-service:test --no-daemon
  artifacts:
    when: always
    reports:
      junit: "**/build/test-results/test/TEST-*.xml"
    paths:
      - "**/build/reports/tests/"
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH

integration-tests:
  stage: test
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
    TESTCONTAINERS_HOST_OVERRIDE: "docker"
  before_script:
    - apk add --no-cache openjdk21
    - export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
  script:
    - ./gradlew :order-service:test --no-daemon -Dgroups=integration
  artifacts:
    when: always
    reports:
      junit: "**/build/test-results/integrationTest/TEST-*.xml"
    paths:
      - "**/build/reports/tests/"
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH

# ─── COVERAGE ────────────────────────────────────────────────────────────────

coverage:
  stage: coverage
  image: eclipse-temurin:21-jdk-alpine
  script:
    - ./gradlew :shared:jacocoTestReport :shared:jacocoCoverageVerification --no-daemon
    - ./gradlew :order-service:jacocoTestReport :order-service:jacocoCoverageVerification --no-daemon
  artifacts:
    when: always
    paths:
      - "**/build/reports/jacoco/"
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH

# ─── BUILD ───────────────────────────────────────────────────────────────────

build-and-push:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  before_script:
    - apk add --no-cache openjdk21
    - export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_NAME:$CI_COMMIT_SHORT_SHA -t $IMAGE_NAME:latest -f order-service/Dockerfile .
    - docker push $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - docker push $IMAGE_NAME:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ─── DEPLOY ──────────────────────────────────────────────────────────────────

deploy:
  stage: deploy
  image: eclipse-temurin:21-jdk-alpine
  script:
    - echo "Deployment placeholder - Minikube/Helm coming soon"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"