stages:
  - validate
  - test
  - coverage
  - build
  - deploy

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

# ─── VALIDATE ───────────────────────────────────────────────────────────────

spotless:
  stage: validate
  image: eclipse-temurin:21-jdk-alpine
  script:
    - ./gradlew spotlessCheck --no-daemon
  rules:
    - if: $CI_COMMIT_BRANCH

# ─── TEST ────────────────────────────────────────────────────────────────────

unit-tests:
  stage: test
  image: eclipse-temurin:21-jdk-alpine
  script:
    - ./gradlew :shared:test :order-service:test :payment-service:test :notification-service:test --no-daemon
  artifacts:
    when: always
    reports:
      junit: "**/build/test-results/test/TEST-*.xml"
    paths:
      - "**/build/reports/tests/"
      - "**/build/jacoco/test.exec"
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH
  cache:
    key: "unit-$CI_COMMIT_REF_SLUG"
    paths:
      - .gradle/
      - shared/build/
      - order-service/build/
      - payment-service/build/
      - notification-service/build/

integration-tests:
  stage: test
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
    TESTCONTAINERS_HOST_OVERRIDE: "docker"
  before_script:
    - apk add --no-cache openjdk21
    - export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
  script:
    - ./gradlew :order-service:integrationTest :payment-service:integrationTest :notification-service:integrationTest --no-daemon
  artifacts:
    when: always
    reports:
      junit: "**/build/test-results/integrationTest/TEST-*.xml"
    paths:
      - "**/build/reports/tests/"
      - "**/build/jacoco/integrationTest.exec"
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH
  cache:
    key: "integration-$CI_COMMIT_REF_SLUG"
    paths:
      - .gradle/
      - shared/build/
      - order-service/build/
      - payment-service/build/
      - notification-service/build/

# ─── COVERAGE ────────────────────────────────────────────────────────────────

coverage:
  stage: coverage
  image: eclipse-temurin:21-jdk-alpine
  dependencies:
    - unit-tests
    - integration-tests
  script:
    - ./gradlew :shared:jacocoTestReport :shared:jacocoCoverageVerification --no-daemon
    - ./gradlew :order-service:jacocoTestReport :order-service:jacocoCoverageVerification --no-daemon
    - ./gradlew :payment-service:jacocoTestReport :payment-service:jacocoCoverageVerification --no-daemon
    - ./gradlew :notification-service:jacocoTestReport :notification-service:jacocoCoverageVerification --no-daemon
  artifacts:
    when: always
    paths:
      - "**/build/reports/jacoco/"
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH

# ─── BUILD ───────────────────────────────────────────────────────────────────

build-order-service:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  before_script:
    - apk add --no-cache openjdk21
    - export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE/order-service:$CI_COMMIT_SHORT_SHA -t $CI_REGISTRY_IMAGE/order-service:latest -f order-service/Dockerfile .
    - docker push $CI_REGISTRY_IMAGE/order-service:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/order-service:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

build-payment-service:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  before_script:
    - apk add --no-cache openjdk21
    - export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE/payment-service:$CI_COMMIT_SHORT_SHA -t $CI_REGISTRY_IMAGE/payment-service:latest -f payment-service/Dockerfile .
    - docker push $CI_REGISTRY_IMAGE/payment-service:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/payment-service:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

build-notification-service:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  before_script:
    - apk add --no-cache openjdk21
    - export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE/notification-service:$CI_COMMIT_SHORT_SHA -t $CI_REGISTRY_IMAGE/notification-service:latest -f notification-service/Dockerfile .
    - docker push $CI_REGISTRY_IMAGE/notification-service:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/notification-service:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ─── DEPLOY ──────────────────────────────────────────────────────────────────

deploy:
  stage: deploy
  image: eclipse-temurin:21-jdk-alpine
  script:
    - echo "Deployment placeholder - Minikube/Helm coming soon"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"